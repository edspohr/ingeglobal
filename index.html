<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingeglobal - Plataforma IoT & Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="img/logo.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Animaciones y Efectos */
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-panel {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar-active {
            background: linear-gradient(90deg, rgba(212, 162, 78, 0.15) 0%, rgba(212, 162, 78, 0) 100%);
            border-left: 3px solid #D4A24E;
            color: #D4A24E;
        }

        /* Video Background Fallback */
        .video-bg {
            position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%;
            z-index: -1; object-fit: cover; filter: brightness(0.4);
            background-color: #111827; /* Fallback si no hay video */
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4A24E; }
    </style>
</head>
<body class="bg-gray-900 text-gray-300 overflow-hidden">

    <div id="view-login" class="w-full h-screen flex items-center justify-center relative fade-in">
        <video autoplay muted loop class="video-bg">
            <source src="vid/login.mp4" type="video/mp4">
        </video>
        
        <div class="glass-panel p-10 rounded-2xl shadow-2xl w-full max-w-md mx-4 relative z-10">
            <div class="text-center mb-8">
                <img src="img/logo.png" alt="Ingeglobal" class="h-24 mx-auto mb-4 drop-shadow-lg hover:scale-105 transition-transform duration-300">
                <h1 class="text-2xl font-bold text-white tracking-tight">Portal de Inteligencia Industrial</h1>
                <p class="text-gray-400 text-sm mt-2">Acceso seguro a monitoreo y reportería</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-500 mb-1 font-semibold">Usuario</label>
                    <div class="relative">
                        <i data-feather="user" class="absolute left-3 top-3 w-5 h-5 text-gray-500"></i>
                        <input type="text" id="username" class="w-full bg-gray-800/50 border border-gray-600 text-white rounded-lg py-2.5 pl-10 focus:ring-2 focus:ring-[#D4A24E] focus:border-transparent outline-none transition-all" placeholder="Ej: admin">
                    </div>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-500 mb-1 font-semibold">Contraseña</label>
                    <div class="relative">
                        <i data-feather="lock" class="absolute left-3 top-3 w-5 h-5 text-gray-500"></i>
                        <input type="password" id="password" class="w-full bg-gray-800/50 border border-gray-600 text-white rounded-lg py-2.5 pl-10 focus:ring-2 focus:ring-[#D4A24E] focus:border-transparent outline-none transition-all" placeholder="••••••">
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-[#D4A24E] to-[#b88a3d] text-gray-900 font-bold py-3 rounded-lg hover:shadow-[0_0_15px_rgba(212,162,78,0.4)] transition-all transform hover:-translate-y-0.5">
                    Iniciar Sesión
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-xs text-gray-500">
                    Perfiles Demo:<br>
                    <span class="text-gray-400">super / admin / gerente / operario</span> (Pass: 123)
                </p>
            </div>
        </div>
    </div>

    <div id="view-dashboard" class="hidden h-screen flex">
        
        <aside class="w-72 bg-[#0B1120] border-r border-gray-800 flex flex-col transition-all duration-300 relative z-20">
            <div class="h-20 flex items-center px-6 border-b border-gray-800 bg-[#0f1623]">
                <img src="img/logo.png" class="h-10 mr-3">
                <span class="text-white font-bold text-lg tracking-wide">INGEGLOBAL</span>
            </div>

            <div class="px-6 py-6 border-b border-gray-800 bg-gray-900/30">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-gray-700 to-gray-600 flex items-center justify-center text-[#D4A24E] font-bold shadow-lg" id="userAvatar">
                        U
                    </div>
                    <div class="ml-3 overflow-hidden">
                        <p class="text-sm font-semibold text-white truncate" id="sidebarUserName">Usuario</p>
                        <p class="text-xs text-[#D4A24E] uppercase tracking-wider truncate" id="sidebarUserRole">Rol</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-1" id="sidebarMenu">
                </nav>

            <div class="p-4 border-t border-gray-800">
                <button onclick="logout()" class="flex items-center w-full px-4 py-2 text-sm text-gray-400 hover:text-white hover:bg-red-900/20 rounded-lg transition-colors">
                    <i data-feather="log-out" class="w-4 h-4 mr-3"></i> Cerrar Sesión
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-gray-900 relative overflow-hidden">
            <header class="h-20 glass-panel border-b-0 border-gray-800 flex items-center justify-between px-8 z-10">
                <div>
                    <h2 class="text-2xl font-bold text-white" id="pageTitle">Dashboard</h2>
                    <p class="text-xs text-gray-500 mt-0.5" id="currentDate">Cargando fecha...</p>
                </div>
                <div class="flex items-center space-x-4">
                    <div id="clientSelectorContainer" class="hidden">
                        <label class="text-xs text-gray-500 mr-2">Viendo como:</label>
                        <select id="globalClientSelect" class="bg-gray-800 border border-gray-600 text-sm text-white rounded-md px-3 py-1 focus:border-[#D4A24E] outline-none">
                            </select>
                    </div>

                    <div class="relative group">
                        <button class="relative p-2 text-gray-400 hover:text-white transition-colors">
                            <i data-feather="bell" class="w-6 h-6"></i>
                            <span id="notifBadge" class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full hidden"></span>
                        </button>
                        <div class="absolute right-0 mt-2 w-80 bg-gray-800 border border-gray-700 rounded-lg shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all transform translate-y-2 z-50">
                            <div class="p-3 border-b border-gray-700 font-semibold text-white">Notificaciones</div>
                            <div id="notificationList" class="max-h-64 overflow-y-auto p-2 space-y-2">
                                <p class="text-center text-gray-500 text-sm py-4">Sin novedades recientes.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <div id="mainContent" class="flex-1 overflow-y-auto p-8 scroll-smooth">
                </div>
        </main>
    </div>

    <script>
        // --- 1. ESTRUCTURA DE DATOS (MOCK DB) ---
        const ROLES = {
            SUPERADMIN: 'superadmin',
            ADMIN: 'admin',
            GERENTE: 'gerente',
            USER: 'user'
        };

        const DB = {
            clients: [
                { 
                    id: 'c_andina', 
                    name: 'Constructora Andina', 
                    services: { liveMonitor: true, reports: true },
                    logo: 'img/logo.png' 
                },
                { 
                    id: 'c_minerals', 
                    name: 'Minerals del Pacífico', 
                    services: { liveMonitor: true, reports: false },
                    logo: 'img/logo.png' 
                }
            ],
            users: [
                { id: 1, user: 'super', pass: '123', role: ROLES.SUPERADMIN, name: 'Roberto Director', clientId: null },
                { id: 2, user: 'admin', pass: '123', role: ROLES.ADMIN, name: 'Admin Andina', clientId: 'c_andina' },
                { id: 3, user: 'gerente', pass: '123', role: ROLES.GERENTE, name: 'Gerente Planta', clientId: 'c_andina' },
                { id: 4, user: 'operario', pass: '123', role: ROLES.USER, name: 'Juan Operador', clientId: 'c_andina', permissions: ['dashboard1', 'dashboard2'] }
            ],
            announcements: [
                { id: 1, from: 'Ingeglobal', text: 'Mantenimiento programado de drones el 25/11.', target: 'global', date: '2023-11-20' }
            ]
        };

        // --- DATA DEL DASHBOARD (Planta Lo Blanco) ---
        const PLANT_DATA = {
            general: { prod: 3980, weekly: 27860, eff: 92, alerts: 2 },
            charts: {
                flow: [1.18, 1.25, 1.34, 1.32, 1.29, 1.3],
                labels: ["08:00", "09:00", "10:00", "11:00", "12:00", "13:00"]
            }
        };

        // --- STATE MANAGEMENT ---
        let currentUser = null;
        let currentClientContext = null; // Para Superadmin navegando clientes
        let chartsInstances = {};

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            feather.replace();
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('es-CL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        });

        // --- AUTH ---
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            const foundUser = DB.users.find(usr => usr.user === u && usr.pass === p);

            if (foundUser) {
                currentUser = foundUser;
                // Si es superadmin, no tiene cliente asignado, por defecto ve el primero
                currentClientContext = currentUser.role === ROLES.SUPERADMIN ? DB.clients[0].id : currentUser.clientId;
                
                initSystem();
            } else {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Credenciales incorrectas', confirmButtonColor: '#D4A24E' });
            }
        });

        function logout() {
            currentUser = null;
            location.reload();
        }

        function initSystem() {
            document.getElementById('view-login').classList.add('hidden');
            const dash = document.getElementById('view-dashboard');
            dash.classList.remove('hidden');
            dash.classList.add('fade-in');

            document.getElementById('sidebarUserName').textContent = currentUser.name;
            let roleLabel = "";
            switch(currentUser.role) {
                case ROLES.SUPERADMIN: roleLabel = "Super Administrador"; break;
                case ROLES.ADMIN: roleLabel = "Admin de Empresa"; break;
                case ROLES.GERENTE: roleLabel = "Gerencia"; break;
                case ROLES.USER: roleLabel = "Operaciones"; break;
            }
            document.getElementById('sidebarUserRole').textContent = roleLabel;
            document.getElementById('userAvatar').textContent = currentUser.name.charAt(0);

            setupSidebar();
            setupHeader();
            
            // Cargar vista por defecto
            if(currentUser.role === ROLES.SUPERADMIN) loadView('sa_overview');
            else loadView('dashboard_live');
        }

        // --- SIDEBAR DINÁMICO ---
        function setupSidebar() {
            const menu = document.getElementById('sidebarMenu');
            menu.innerHTML = '';

            const createLink = (id, label, icon) => {
                const a = document.createElement('a');
                a.href = "#";
                a.className = `flex items-center px-4 py-3 mb-1 text-sm font-medium text-gray-400 rounded-lg hover:bg-gray-800 hover:text-white transition-all group sidebar-link`;
                a.dataset.view = id;
                a.innerHTML = `<i data-feather="${icon}" class="w-5 h-5 mr-3 group-hover:text-[#D4A24E] transition-colors"></i> ${label}`;
                a.onclick = (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('sidebar-active'));
                    a.classList.add('sidebar-active');
                    loadView(id);
                };
                return a;
            };

            // SUPERADMIN MENU
            if (currentUser.role === ROLES.SUPERADMIN) {
                menu.appendChild(createLink('sa_overview', 'Gestión Global', 'globe'));
                menu.appendChild(createLink('sa_clients', 'Clientes & Servicios', 'briefcase'));
                menu.appendChild(createLink('sa_announcements', 'Anuncios', 'mic'));
                menu.appendChild(document.createElement('hr')).className = "border-gray-700 my-4 mx-4";
                menu.innerHTML += `<p class="px-4 text-xs uppercase text-gray-500 mb-2 font-bold">Vista Cliente</p>`;
                menu.appendChild(createLink('dashboard_live', 'Monitoreo Planta', 'activity'));
            }
            // ADMIN & GERENTE MENU
            else if ([ROLES.ADMIN, ROLES.GERENTE].includes(currentUser.role)) {
                const client = DB.clients.find(c => c.id === currentClientContext);
                if(client.services.liveMonitor) menu.appendChild(createLink('dashboard_live', 'Monitor en Vivo', 'activity'));
                if(client.services.reports) menu.appendChild(createLink('dashboard_reports', 'Reportería Estática', 'file-text'));
                
                if(currentUser.role === ROLES.ADMIN) {
                    menu.appendChild(document.createElement('hr')).className = "border-gray-700 my-4 mx-4";
                    menu.appendChild(createLink('admin_users', 'Gestión Usuarios', 'users'));
                    menu.appendChild(createLink('admin_settings', 'Configuración', 'settings'));
                }
            } 
            // USER MENU
            else {
                const client = DB.clients.find(c => c.id === currentClientContext);
                // Simulación de permisos
                if(client.services.liveMonitor && currentUser.permissions.includes('dashboard1')) {
                    menu.appendChild(createLink('dashboard_live', 'Cintas & Procesos', 'activity'));
                }
                 if(client.services.liveMonitor && currentUser.permissions.includes('dashboard2')) {
                    menu.appendChild(createLink('dashboard_stock', 'Stockpiles', 'layers')); // Ejemplo
                }
            }
            
            feather.replace();
            // Activar primero por defecto
            const firstLink = menu.querySelector('a');
            if(firstLink) firstLink.classList.add('sidebar-active');
        }

        function setupHeader() {
            if (currentUser.role === ROLES.SUPERADMIN) {
                const container = document.getElementById('clientSelectorContainer');
                const select = document.getElementById('globalClientSelect');
                container.classList.remove('hidden');
                container.classList.add('flex', 'items-center');
                
                select.innerHTML = '';
                DB.clients.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.textContent = c.name;
                    select.appendChild(opt);
                });
                select.value = currentClientContext;
                
                select.addEventListener('change', (e) => {
                    currentClientContext = e.target.value;
                    Swal.fire({
                        title: 'Cambiando Contexto',
                        text: `Visualizando datos de ${DB.clients.find(c=>c.id===currentClientContext).name}`,
                        timer: 1000,
                        showConfirmButton: false,
                        background: '#1f2937',
                        color: '#fff'
                    }).then(() => {
                        // Si estamos en una vista de dashboard, recargarla
                        const activeView = document.querySelector('.sidebar-active').dataset.view;
                        loadView(activeView);
                    });
                });
            }
            renderNotifications();
        }

        // --- ROUTER / VIEW LOADER ---
        function loadView(viewId) {
            const content = document.getElementById('mainContent');
            const title = document.getElementById('pageTitle');
            content.innerHTML = '';
            
            // Cleanup Charts
            Object.values(chartsInstances).forEach(chart => chart.destroy());
            chartsInstances = {};

            // Check Access for Services
            const client = DB.clients.find(c => c.id === currentClientContext);

            switch(viewId) {
                // --- VISTAS SUPERADMIN ---
                case 'sa_overview':
                    title.textContent = "Visión Global del Negocio";
                    content.innerHTML = renderSuperAdminOverview();
                    break;
                case 'sa_clients':
                    title.textContent = "Administración de Clientes";
                    content.innerHTML = renderSuperAdminClients();
                    break;
                case 'sa_announcements':
                    title.textContent = "Centro de Anuncios";
                    content.innerHTML = renderAnnouncementsPanel();
                    break;

                // --- VISTAS OPERATIVAS ---
                case 'dashboard_live':
                    if(!client.services.liveMonitor) {
                        content.innerHTML = renderLockedService('Monitoreo en Vivo');
                        return;
                    }
                    title.textContent = `Monitoreo en Vivo - ${client.name}`;
                    content.innerHTML = renderLiveDashboard();
                    initLiveCharts();
                    break;
                
                case 'dashboard_reports':
                    if(!client.services.reports) {
                        content.innerHTML = renderLockedService('Reportería');
                        return;
                    }
                    title.textContent = "Reportes Históricos";
                    content.innerHTML = renderReportsView();
                    break;

                case 'admin_users':
                    title.textContent = "Gestión de Usuarios Locales";
                    content.innerHTML = renderUserManagement();
                    break;
                
                default:
                    content.innerHTML = `<div class="text-center mt-20"><h3 class="text-xl text-gray-500">Seleccione una opción del menú</h3></div>`;
            }
            feather.replace();
        }

        // ================= RENDER FUNCTIONS =================

        function renderLockedService(serviceName) {
            return `
                <div class="h-full flex flex-col items-center justify-center text-center opacity-0 fade-in" style="animation-fill-mode: forwards;">
                    <div class="p-6 rounded-full bg-gray-800 mb-4">
                        <i data-feather="lock" class="w-12 h-12 text-gray-500"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-white mb-2">Servicio No Contratado</h2>
                    <p class="text-gray-400 max-w-md">El módulo de <span class="text-[#D4A24E]">${serviceName}</span> no está habilitado para ${DB.clients.find(c=>c.id===currentClientContext).name}.</p>
                    ${currentUser.role === ROLES.SUPERADMIN ? `<button onclick="loadView('sa_clients')" class="mt-6 px-6 py-2 bg-[#D4A24E] text-gray-900 rounded font-bold">Habilitar Ahora</button>` : ''}
                </div>
            `;
        }

        function renderSuperAdminOverview() {
            return `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 fade-in">
                    <div class="glass-panel p-6 rounded-xl border-l-4 border-[#D4A24E]">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-gray-400 text-sm">Clientes Totales</p>
                                <h3 class="text-3xl font-bold text-white mt-1">${DB.clients.length}</h3>
                            </div>
                            <div class="p-2 bg-[#D4A24E]/20 rounded-lg"><i data-feather="briefcase" class="text-[#D4A24E]"></i></div>
                        </div>
                    </div>
                    <div class="glass-panel p-6 rounded-xl border-l-4 border-blue-500">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-gray-400 text-sm">Usuarios Sistema</p>
                                <h3 class="text-3xl font-bold text-white mt-1">${DB.users.length}</h3>
                            </div>
                            <div class="p-2 bg-blue-500/20 rounded-lg"><i data-feather="users" class="text-blue-500"></i></div>
                        </div>
                    </div>
                    <div class="glass-panel p-6 rounded-xl border-l-4 border-green-500">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-gray-400 text-sm">Estado Servidores</p>
                                <h3 class="text-3xl font-bold text-green-400 mt-1">100%</h3>
                            </div>
                            <div class="p-2 bg-green-500/20 rounded-lg"><i data-feather="server" class="text-green-500"></i></div>
                        </div>
                    </div>
                </div>

                <div class="mt-8 glass-panel rounded-xl p-6 fade-in">
                    <h3 class="text-lg font-semibold text-white mb-4">Actividad Reciente del Sistema</h3>
                    <div class="space-y-4">
                        <div class="flex items-center p-3 hover:bg-gray-800/50 rounded-lg transition">
                            <div class="w-2 h-2 bg-green-500 rounded-full mr-4"></div>
                            <p class="text-sm text-gray-300">Nuevo usuario creado en <span class="text-white font-semibold">Constructora Andina</span> por Admin.</p>
                            <span class="ml-auto text-xs text-gray-500">Hace 10 min</span>
                        </div>
                         <div class="flex items-center p-3 hover:bg-gray-800/50 rounded-lg transition">
                            <div class="w-2 h-2 bg-[#D4A24E] rounded-full mr-4"></div>
                            <p class="text-sm text-gray-300">Alerta de stock crítico reportada en <span class="text-white font-semibold">Minerals del Pacífico</span>.</p>
                            <span class="ml-auto text-xs text-gray-500">Hace 45 min</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSuperAdminClients() {
            return `
                <div class="glass-panel rounded-xl overflow-hidden fade-in">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-800/50 text-gray-400 text-xs uppercase tracking-wider">
                                <th class="p-4">Cliente</th>
                                <th class="p-4 text-center">Live Monitor</th>
                                <th class="p-4 text-center">Reportería</th>
                                <th class="p-4 text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-700">
                            ${DB.clients.map(c => `
                                <tr class="hover:bg-gray-800/30 transition">
                                    <td class="p-4 font-medium text-white flex items-center">
                                        <div class="w-8 h-8 rounded bg-gray-700 flex items-center justify-center mr-3 text-xs">${c.id.substring(2,4).toUpperCase()}</div>
                                        ${c.name}
                                    </td>
                                    <td class="p-4 text-center">
                                        <button onclick="toggleService('${c.id}', 'liveMonitor')" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${c.services.liveMonitor ? 'bg-[#D4A24E]' : 'bg-gray-600'}">
                                            <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${c.services.liveMonitor ? 'translate-x-6' : 'translate-x-1'}"></span>
                                        </button>
                                    </td>
                                    <td class="p-4 text-center">
                                        <button onclick="toggleService('${c.id}', 'reports')" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${c.services.reports ? 'bg-[#D4A24E]' : 'bg-gray-600'}">
                                            <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${c.services.reports ? 'translate-x-6' : 'translate-x-1'}"></span>
                                        </button>
                                    </td>
                                    <td class="p-4 text-right">
                                        <button class="text-gray-400 hover:text-white"><i data-feather="settings" class="w-4 h-4"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="p-4 bg-gray-800/30 border-t border-gray-700">
                        <button onclick="Swal.fire('Funcionalidad Demo', 'Aquí se abriría el modal de crear cliente', 'info')" class="text-sm text-[#D4A24E] font-semibold hover:underline flex items-center">
                            <i data-feather="plus" class="w-4 h-4 mr-2"></i> Agregar Nuevo Cliente
                        </button>
                    </div>
                </div>
            `;
        }

        function renderLiveDashboard() {
            // Banner de Anuncios Globales o Locales
            const announcements = DB.announcements.filter(a => a.target === 'global' || a.target === currentClientContext);
            let bannerHtml = '';
            if(announcements.length > 0) {
                bannerHtml = `
                    <div class="bg-gradient-to-r from-[#D4A24E]/20 to-transparent border-l-4 border-[#D4A24E] p-4 mb-6 rounded-r-lg flex items-start fade-in">
                        <i data-feather="info" class="text-[#D4A24E] mt-1 mr-3 flex-shrink-0"></i>
                        <div>
                            <h4 class="text-[#D4A24E] font-bold text-sm">Anuncio Importante</h4>
                            <p class="text-sm text-gray-300">${announcements[0].text}</p>
                        </div>
                    </div>
                `;
            }

            return `
                ${bannerHtml}
                
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8 fade-in">
                    <div class="glass-panel p-5 rounded-xl relative overflow-hidden group">
                        <div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition"><i data-feather="box" class="w-16 h-16 text-white"></i></div>
                        <p class="text-gray-400 text-xs uppercase font-semibold">Producción Hoy</p>
                        <h3 class="text-3xl font-bold text-white mt-1">${PLANT_DATA.general.prod.toLocaleString()} m³</h3>
                        <p class="text-xs text-green-400 mt-2 flex items-center"><i data-feather="trending-up" class="w-3 h-3 mr-1"></i> +4.5% vs ayer</p>
                    </div>
                    <div class="glass-panel p-5 rounded-xl relative overflow-hidden group">
                        <div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition"><i data-feather="activity" class="w-16 h-16 text-white"></i></div>
                        <p class="text-gray-400 text-xs uppercase font-semibold">Eficiencia Planta</p>
                        <h3 class="text-3xl font-bold text-white mt-1">${PLANT_DATA.general.eff}%</h3>
                        <div class="w-full bg-gray-700 h-1.5 rounded-full mt-3 overflow-hidden">
                            <div class="bg-[#D4A24E] h-full rounded-full" style="width: 92%"></div>
                        </div>
                    </div>
                     <div class="glass-panel p-5 rounded-xl relative overflow-hidden group">
                        <div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition"><i data-feather="alert-triangle" class="w-16 h-16 text-white"></i></div>
                        <p class="text-gray-400 text-xs uppercase font-semibold">Alertas Activas</p>
                        <h3 class="text-3xl font-bold text-red-400 mt-1">${PLANT_DATA.general.alerts}</h3>
                        <p class="text-xs text-gray-500 mt-2">Requiere atención</p>
                    </div>
                     <div class="glass-panel p-0 rounded-xl relative overflow-hidden bg-black flex items-center justify-center border border-red-500/30">
                        <div class="absolute top-2 left-2 flex items-center space-x-2">
                            <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                            <span class="text-[10px] text-white font-bold bg-black/50 px-1 rounded">LIVE CAM 01</span>
                        </div>
                        <img src="https://images.unsplash.com/photo-1581092921461-eab62e97a783?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80" class="w-full h-full object-cover opacity-60">
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 fade-in delay-100">
                    <div class="lg:col-span-2 glass-panel p-6 rounded-xl">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-semibold text-white">Flujo de Material en Cintas</h3>
                            <div class="flex space-x-2">
                                <span class="w-3 h-3 rounded-full bg-[#D4A24E]"></span><span class="text-xs text-gray-400">Arena</span>
                            </div>
                        </div>
                        <div class="h-72 w-full">
                            <canvas id="liveChart"></canvas>
                        </div>
                    </div>

                    <div class="glass-panel p-6 rounded-xl">
                        <h3 class="font-semibold text-white mb-4">Estado de Equipos</h3>
                        <div class="space-y-4">
                            <div class="flex justify-between items-center p-3 bg-green-500/10 border border-green-500/20 rounded-lg">
                                <div class="flex items-center">
                                    <i data-feather="check-circle" class="text-green-500 w-5 h-5 mr-3"></i>
                                    <span class="text-sm font-medium text-gray-200">Chancador Primario</span>
                                </div>
                                <span class="text-xs text-green-400 font-bold">ONLINE</span>
                            </div>
                            <div class="flex justify-between items-center p-3 bg-yellow-500/10 border border-yellow-500/20 rounded-lg">
                                <div class="flex items-center">
                                    <i data-feather="alert-circle" class="text-yellow-500 w-5 h-5 mr-3"></i>
                                    <span class="text-sm font-medium text-gray-200">Cinta Transportadora 3</span>
                                </div>
                                <span class="text-xs text-yellow-400 font-bold">VIBRACIÓN</span>
                            </div>
                             <div class="flex justify-between items-center p-3 bg-green-500/10 border border-green-500/20 rounded-lg">
                                <div class="flex items-center">
                                    <i data-feather="check-circle" class="text-green-500 w-5 h-5 mr-3"></i>
                                    <span class="text-sm font-medium text-gray-200">Harnero Secundario</span>
                                </div>
                                <span class="text-xs text-green-400 font-bold">ONLINE</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderUserManagement() {
            const users = DB.users.filter(u => u.clientId === currentClientContext);
            
            return `
                <div class="glass-panel rounded-xl p-6 fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold text-white">Usuarios de ${DB.clients.find(c=>c.id===currentClientContext).name}</h3>
                        <button onclick="Swal.fire('Demo', 'Crear usuario', 'info')" class="bg-[#D4A24E] text-gray-900 px-4 py-2 rounded-lg font-bold text-sm hover:bg-[#E4B56E] transition">
                            + Nuevo Usuario
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-800 text-gray-400">
                                <tr>
                                    <th class="p-3 rounded-l-lg">Nombre</th>
                                    <th class="p-3">Rol</th>
                                    <th class="p-3">Acceso</th>
                                    <th class="p-3 text-right rounded-r-lg">Acciones</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-700">
                                ${users.map(u => `
                                    <tr class="group hover:bg-gray-800/50 transition">
                                        <td class="p-3 text-white font-medium">${u.name}</td>
                                        <td class="p-3 text-gray-300 capitalize">${u.role}</td>
                                        <td class="p-3">
                                            ${u.role === ROLES.USER 
                                                ? `<span class="bg-blue-900 text-blue-300 px-2 py-1 rounded text-xs">Limitado</span>` 
                                                : `<span class="bg-green-900 text-green-300 px-2 py-1 rounded text-xs">Total</span>`}
                                        </td>
                                        <td class="p-3 text-right opacity-0 group-hover:opacity-100 transition">
                                            <button class="text-gray-400 hover:text-white mx-1"><i data-feather="edit-2" class="w-4 h-4"></i></button>
                                            <button class="text-red-400 hover:text-red-300 mx-1"><i data-feather="trash" class="w-4 h-4"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderAnnouncementsPanel() {
            return `
                <div class="glass-panel p-6 rounded-xl fade-in">
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-400 mb-2">Crear Nuevo Anuncio</label>
                        <textarea class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white focus:border-[#D4A24E] outline-none" rows="3" placeholder="Escribe el mensaje aquí..."></textarea>
                        <div class="flex justify-between items-center mt-3">
                            <select class="bg-gray-800 border border-gray-700 text-gray-300 text-sm rounded p-2">
                                <option value="global">Global (Todos los clientes)</option>
                                ${DB.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                            </select>
                            <button onclick="Swal.fire('Enviado', 'El anuncio ha sido publicado', 'success')" class="bg-[#D4A24E] text-gray-900 px-6 py-2 rounded font-bold text-sm hover:bg-[#E4B56E]">Publicar</button>
                        </div>
                    </div>
                    <hr class="border-gray-700 my-6">
                    <h4 class="text-white font-semibold mb-4">Historial</h4>
                    <div class="space-y-3">
                        ${DB.announcements.map(a => `
                            <div class="bg-gray-800 p-4 rounded-lg border-l-4 ${a.target === 'global' ? 'border-blue-500' : 'border-gray-500'}">
                                <div class="flex justify-between">
                                    <p class="text-white font-medium text-sm">${a.text}</p>
                                    <span class="text-xs text-gray-500">${a.date}</span>
                                </div>
                                <p class="text-xs text-gray-400 mt-1 uppercase">Destino: ${a.target === 'global' ? 'Todos' : a.target}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function renderReportsView() {
            return `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 fade-in">
                    <div class="glass-panel p-6 rounded-xl flex items-center justify-between cursor-pointer hover:bg-gray-800 transition">
                        <div class="flex items-center">
                            <div class="p-4 bg-red-500/10 rounded-lg text-red-500 mr-4"><i data-feather="file-text"></i></div>
                            <div>
                                <h4 class="text-white font-bold">Reporte Mensual Octubre</h4>
                                <p class="text-sm text-gray-400">PDF - 2.4 MB</p>
                            </div>
                        </div>
                        <i data-feather="download" class="text-gray-500"></i>
                    </div>
                    <div class="glass-panel p-6 rounded-xl flex items-center justify-between cursor-pointer hover:bg-gray-800 transition">
                        <div class="flex items-center">
                            <div class="p-4 bg-red-500/10 rounded-lg text-red-500 mr-4"><i data-feather="file-text"></i></div>
                            <div>
                                <h4 class="text-white font-bold">Certificado de Calibración</h4>
                                <p class="text-sm text-gray-400">PDF - 1.1 MB</p>
                            </div>
                        </div>
                        <i data-feather="download" class="text-gray-500"></i>
                    </div>
                </div>
            `;
        }

        // --- LOGIC HELPERS ---
        function toggleService(clientId, service) {
            const client = DB.clients.find(c => c.id === clientId);
            client.services[service] = !client.services[service];
            loadView('sa_clients'); // Re-render
            
            const status = client.services[service] ? 'Activado' : 'Desactivado';
            const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true });
            Toast.fire({ icon: 'success', title: `${service === 'liveMonitor' ? 'Monitoreo' : 'Reportes'} ${status}` });
        }

        function renderNotifications() {
            const list = document.getElementById('notificationList');
            const badge = document.getElementById('notifBadge');
            const relevant = DB.announcements.filter(a => a.target === 'global' || a.target === currentClientContext);
            
            if(relevant.length > 0) {
                badge.classList.remove('hidden');
                list.innerHTML = relevant.map(a => `
                    <div class="bg-gray-700/50 p-2 rounded border-l-2 border-[#D4A24E]">
                        <p class="text-xs text-white">${a.text}</p>
                        <span class="text-[10px] text-gray-400">${a.date}</span>
                    </div>
                `).join('');
            } else {
                badge.classList.add('hidden');
                list.innerHTML = '<p class="text-center text-gray-500 text-sm py-2">Sin novedades.</p>';
            }
        }

        function initLiveCharts() {
            const ctx = document.getElementById('liveChart');
            if(!ctx) return;
            
            const chart = new Chart(ctx.getContext('2d'), {
                type: 'line',
                data: {
                    labels: PLANT_DATA.charts.labels,
                    datasets: [{
                        label: 'Flujo (m³/min)',
                        data: PLANT_DATA.charts.flow,
                        borderColor: '#D4A24E',
                        backgroundColor: (context) => {
                            const ctx = context.chart.ctx;
                            const gradient = ctx.createLinearGradient(0, 0, 0, 300);
                            gradient.addColorStop(0, 'rgba(212, 162, 78, 0.5)');
                            gradient.addColorStop(1, 'rgba(212, 162, 78, 0)');
                            return gradient;
                        },
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#111827',
                        pointBorderColor: '#D4A24E',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false, color: '#374151' }, ticks: { color: '#9CA3AF' } },
                        y: { grid: { color: 'rgba(55, 65, 81, 0.5)' }, ticks: { color: '#9CA3AF' } }
                    }
                }
            });
            chartsInstances['liveChart'] = chart;
        }

    </script>
</body>
</html>
